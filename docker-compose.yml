version: '3.8'

services:
  # ============================================================
  # TimescaleDB — Time-series database (PostgreSQL extension)
  # ============================================================
  timescaledb:
    image: timescale/timescaledb:2-pg16
    container_name: nexus-timescaledb
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus -d nexus']
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Zookeeper — Kafka cluster coordinator
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6
    container_name: nexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo srvr | nc -w 2 localhost 2181 || exit 1
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # Kafka — Event streaming broker
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.6
    container_name: nexus-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
